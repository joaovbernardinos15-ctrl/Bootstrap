<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
        <link rel="stylesheet" href="Dever/css/style.css">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <body>
        <div class="all">

            <div class="mb-3">

                <div class="bootstrap1"><img class="bootstrap"
                        src="https://getbootstrap.com/docs/4.0/assets/brand/bootstrap-social-logo.png"
                        alt>
                </div>

                <div class="Link1"></div>
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.
                    Doloribus dolores sint delectus nihil natus</p>
                <a href="https://getbootstrap.com/">Site Bootstrap</a>
                

                <label for="exampleFormControlInput1" class="form-label">Email
                    address</label>
                <input type="email" class="form-control"
                    id="exampleFormControlInput1"
                    placeholder="Email">

                <label for="inputPassword5" class="form-label">Password</label>
                <input type="password" id="inputPassword5" class="form-control"
                    aria-describedby="passwordHelpBlock" placeholder="Password">

            </div>

            <div class="input-group mb-3" id="box">
                <div class="input-group-text">
                    <label for="">Remember me</label>
                    <input  type="checkbox" value
                        aria-label="Checkbox for following text input">
                </div>
              
            </div>

          

            <div id="passwordHelpBlock" class="form-text">
                Sua senha deve ter 8-20 Características não pode conter emojis.
            </div>

            <div class="botao1"><button type="button"
                    class="btn btn-primary btn-lg">Login</button></div>

        </div>
